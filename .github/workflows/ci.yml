name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (pytest + ruff + mypy + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.23"
          enable-cache: true

      - name: Sync toolchain from uv.lock (Python 3.13)
        run: uv sync --locked --all-groups --python 3.13

      - name: ruff check
        run: uv run --with ruff ruff check .

      - name: mypy
        run: uv run mypy

      - name: pytest
        run: uv run pytest -q

      - name: pip-audit
        run: uv run --with pip-audit pip-audit

  web:
    name: Web (tsc --noEmit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies (frozen)
        run: bun install --frozen-lockfile

      - name: tsc --noEmit
        run: bunx tsc --noEmit -p tsconfig.json
