[project]
name = "lawnlord"
version = "0.1.0"
description = "Explode a legal court-record packet into a structured, citation-preserving five-level corpus (archive → submission → document → section → page)."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "pymupdf>=1.27.2.3",
    "python-slugify>=8.0.4",
    "rich>=15.0.0",
]

[project.scripts]
lawnlord = "lawnlord.cli:main"

[dependency-groups]
dev = [
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lawnlord"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
