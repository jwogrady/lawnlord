[Service]
# Optimal config (benchmarked). The bottleneck is the CPU vision projector
# (--no-mmproj-offload), which already uses ~half the Ryzen's threads for ONE
# request; concurrency only inflates per-page prefill (23s->76s at c=4) with no
# throughput gain. So NUM_PARALLEL=1 wins — confirmed clean (distinct images,
# warm model). f16 KV cache (q8 added overhead, didn't help). Speed lever is
# render resolution (qwen reads at 1500px), not the server.
Environment="OLLAMA_NUM_PARALLEL=1"
Environment="OLLAMA_MAX_LOADED_MODELS=1"
Environment="OLLAMA_FLASH_ATTENTION=1"
Environment="OLLAMA_KEEP_ALIVE=30m"
